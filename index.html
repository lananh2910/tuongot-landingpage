<style>
  :root {
    --green: #3B6D11;
    --green-d: #27500A;
    --bg-soft: #EAF3DE;
    --accent: #C0DD97;
    --ink: #2a2f24;
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, "Helvetica Neue", Arial, sans-serif;
    color: var(--ink);
    background: #fff;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 0 28px; }
  h1, h2, h3, h4 { text-wrap: balance; }
  p { text-wrap: pretty; }
  img { display: block; }
  ::selection { background: var(--accent); color: var(--green-d); }

  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
  @keyframes pop { from { opacity: 0; transform: scale(.96) translateY(8px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  @keyframes toastIn { from { opacity: 0; transform: translate(-50%, 12px); } to { opacity: 1; transform: translate(-50%, 0); } }

  .nav-a { position: relative; }
  .nav-a::after { content: ''; position: absolute; left: 0; bottom: -5px; width: 0; height: 2px; background: var(--green); transition: width .2s ease; }
  .nav-a:hover::after { width: 100%; }
  .nav-a:hover { color: var(--green); }

  /* horizontal product cards: full row each on wide */
  .prod-h { grid-template-columns: repeat(2, 1fr); }

  /* Tablet */
  @media (max-width: 960px) {
    .hero-grid { grid-template-columns: 1fr !important; gap: 32px !important; }
    .hero-img { order: -1; }
    .story-grid { grid-template-columns: 1fr !important; gap: 28px !important; }
    .cta-split { grid-template-columns: 1fr !important; }
    .foot-grid { grid-template-columns: 1fr 1fr !important; }
    .prod-grid { grid-template-columns: repeat(2, 1fr) !important; }
  }

  /* Mobile */
  @media (max-width: 768px) {
    .wrap { padding: 0 18px; }
    .nav-links, .nav-cta { display: none !important; }
    .nav-burger { display: grid !important; }
    .nav-mobile { display: flex !important; }
    .trust-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 20px 0; }
    .trust-grid > div:nth-child(odd) { border-left: none !important; }
    .trust-grid > div:nth-child(3), .trust-grid > div:nth-child(4) { padding-top: 18px; border-top: 0.5px solid rgba(0,0,0,.08); }
    .prod-grid, .prod-h { grid-template-columns: 1fr !important; }
    .why-grid { grid-template-columns: 1fr !important; }
    .foot-grid { grid-template-columns: 1fr !important; gap: 28px !important; }
    .modal { flex-direction: column !important; max-height: 90vh !important; }
    .order-summary { border-left: none !important; border-top: 0.5px solid rgba(0,0,0,.08); }
    .pm-img { max-height: 240px; }
    .cta-steps { font-size: 13px; }
    .zalo-fab { bottom: 16px; right: 16px; }
  }
  @media (max-width: 768px) {
    .prod-h article { flex-direction: row !important; }
  }
</style>
</head>
